# GW protocol for 2D materials with CP2K
# Uses QUICKSTEP (GPW) with augmented basis sets and RI auxiliary basis
basis_pseudo: aug-dzvp-pbe-gth.yml

gw:
  kpoints_distance: 0.3
  kpoints_w_distance: 0.3
  GLOBAL:
    PROJECT: GW-2D
    RUN_TYPE: ENERGY
    PRINT_LEVEL: MEDIUM
  FORCE_EVAL:
    METHOD: Quickstep
    DFT:
      SORT_BASIS: EXP
      CHARGE: 0
      QS:
        METHOD: GAPW
        EPS_DEFAULT: 1.0E-12
        EPS_PGF_ORB: 1.0E-12
      SCF:
        SCF_GUESS: ATOMIC
        MAX_SCF: 500
        PRINT:
          RESTART:
            _: "ON"
        ADDED_MOS: -1
        MIXING:
          METHOD: BROYDEN_MIXING
          ALPHA: 0.1
          BETA: 1.5
          NBROYDEN: 8
      POISSON:
        PERIODIC: XYZ
        POISSON_SOLVER: PERIODIC
      XC:
        XC_FUNCTIONAL:
          _: PBE
    PROPERTIES:
      BANDSTRUCTURE:
        DOS: {}
        SOC: {}  
        GW:
          NUM_TIME_FREQ_POINTS: 30
          EPS_FILTER: 1.0E-8
          CUTOFF_RADIUS_RI: 7.0
          REGULARIZATION_RI: 0.01
    SUBSYS:
      CELL:
        PERIODIC: XZ
