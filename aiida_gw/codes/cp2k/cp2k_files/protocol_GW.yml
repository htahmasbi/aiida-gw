# GW protocol for 2D materials with CP2K
# Uses QUICKSTEP (GPW) with augmented basis sets and RI auxiliary basis
basis_pseudo: aug-dzvp-pbe-gth.yml

gw:
  kpoints_distance: 0.3
  kpoints_w_distance: 0.3
  GLOBAL:
    PROJECT: GW-2D
    RUN_TYPE: ENERGY
    PRINT_LEVEL: MEDIUM
  FORCE_EVAL:
    METHOD: Quickstep
    DFT:
      SORT_BASIS: EXP
      CHARGE: 0
      QS:
        METHOD: GPW
        EPS_DEFAULT: 1.0E-12
        EPS_PGF_ORB: 1.0E-12
      SCF:
        SCF_GUESS: ATOMIC
        MAX_SCF: 500
        ADDED_MOS: 20
        EPS_SCF: 1.0E-6
        OUTER_SCF:
          MAX_SCF: 10
          EPS_SCF: 1.0E-6
          DIIS: {}
        PRINT:
          RESTART:
            _: "ON"
        MIXING:
          METHOD: BROYDEN_MIXING
          ALPHA: 0.2
          BETA: 0.8
          NBROYDEN: 10
      POISSON:
        PERIODIC: XYZ
        POISSON_SOLVER: PERIODIC
      XC:
        XC_FUNCTIONAL:
          _: PBE
    PROPERTIES:
      BANDSTRUCTURE:
        DOS: {}
        GW:
          NUM_TIME_FREQ_POINTS: 10
          EPS_FILTER: 1.0E-6
          CUTOFF_RADIUS_RI: 5
          REGULARIZATION_RI: 0.01
    SUBSYS:
      CELL:
        PERIODIC: XZ
