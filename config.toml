code_label = "cp2k@localhost"

[metadata_options]
num_machines = 2
num_mpiprocs_per_machine = 128
max_wallclock_seconds = 86400
memory_per_machine = "1500G"
partition = "cpu-genoa"

[cp2k]
cutoff = 400
kpoints_distance = 0.3

[gw]
kpoints_distance = 0.06
kpoints_w_distance = 0.06
cutoff = 400
rel_cutoff = 50
periodic = "XZ"
num_time_freq = 10
memory_per_proc = 8
eps_filter = 1.0e-6
cutoff_radius_ri = 5
regularization_ri = 0.01
eps_default = 1.0e-12
eps_pgf_orb = 1.0e-12
eps_scf = 5.0e-7
max_scf = 500
mixing_alpha = 0.2
mixing_beta = 0.8
mixing_nbroyden = 10
vacuum = 20.0
supercell = [2, 2, 1]
bs_npoints = 20

# Basis/potential resolution — resolves names from the data files below
resolve_from_files = true
ri_basis_accuracy_target = 1e-5
orb_basis = "aug-SZV-MOLOPT-GTH-tier-1"

basis_set_file = "/path/to/BASIS_GTH_MOLOPT_AUG_for_excited_states"
ri_basis_set_file = "/path/to/BASIS_GTH_MOLOPT_AUG_for_excited_states_RI"
potential_file = "/path/to/POTENTIAL_UZH"

# Per-element overrides (when resolve_from_files fails or you need explicit names)
# Example for Te₂W:
# [gw.element_settings.Te]
# orb_basis = "aug-DZVP-MOLOPT-SR-GTH-q6"
# ri_basis = "RI_aug-DZVP-MOLOPT-SR-GTH-q6_..._error_1.0e-05"
# potential = "GTH-PBE-q6"
# [gw.element_settings.W]
# orb_basis = "aug-DZVP-MOLOPT-SR-GTH-q14"
# potential = "GTH-PBE-q14"

# Smearing — enable only if SCF still doesn't converge (e.g. small-gap systems)
# gw.smearing = true
# gw.smearing_electronic_temperature = 300.0
# gw.smearing_method = "FERMI_DIRAC"

# Additional MOs for SCF stability (0 = use protocol default)
# gw.added_mos = 40
