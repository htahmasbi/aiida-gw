code_label = "cp2k@localhost"

[metadata_options]
num_machines = 2
num_mpiprocs_per_machine = 16
cpus_per_task = 8
max_wallclock_seconds = 86400
memory_per_machine = "0"
partition = "cpu-genoa"

[cp2k]
cutoff = 400
kpoints_distance = 0.3

[gw]
kpoints_distance = 0.08
kpoints_w_distance = 0.3
cutoff = 400
rel_cutoff = 50
periodic = "XYZ"
cell_periodic = "XYZ"
num_time_freq = 10
memory_per_proc = 8
eps_filter = 1.0e-6
cutoff_radius_ri = 5
regularization_ri = 0.01
eps_default = 1.0e-12
eps_pgf_orb = 1.0e-12
eps_scf = 5.0e-7
max_scf = 500
mixing_alpha = 0.1
mixing_beta = 1.5
mixing_nbroyden = 10
vacuum = 20.0
supercell = [1, 1, 1]
bs_npoints = 20

# Per-element overrides for basis/potential/RI resolution: 
# Add entries for any new elements you need, e.g.:
#
# [gw.element_settings.B]
# orb_basis = "aug-SZV-MOLOPT-GTH-tier-1"
# ri_basis = "RI_aug-SZV-MOLOPT-GTH-tier-1_N_RI_009_s_p_d_f_g_h_i_3_2_0_0_0_0_0_error_1.1e-06"
# potential = "GTH-PBE-q3"

# Alternatively, set auto_resolve = true to read element name mappings
# directly from the three file paths (files must be locally accessible):

resolve_from_files = true
ri_basis_accuracy_target = 1e-5
orb_basis = "aug-SZV-MOLOPT-GTH-tier-1"

basis_set_file = "/home/tahmas41/work/GW_2D/BASIS_AUG_MOLOPT/BASIS_GTH_MOLOPT_AUG_for_excited_states"
ri_basis_set_file = "/home/tahmas41/work/GW_2D/BASIS_AUG_MOLOPT/BASIS_GTH_MOLOPT_AUG_for_excited_states_RI"
potential_file = "/home/tahmas41/work/GW_2D/cp2k/data/POTENTIAL_UZH"
